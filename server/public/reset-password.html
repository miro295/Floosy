<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>إعادة تعيين كلمة السر - Floosy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#0f172a; --card:#111827; --text:#e5e7eb; --primary:#22c55e;
      --muted:#94a3b8; --border:rgba(148,163,184,.15); --primary-hover:#16a34a;
    }
    body{margin:0;min-height:100vh;background:linear-gradient(180deg,#0b1220,#0f172a);
         color:var(--text);font-family:system-ui,sans-serif;display:grid;place-items:center;padding:20px}
    .box{background:var(--card);border:1px solid var(--border);padding:24px;border-radius:16px;
         box-shadow:0 12px 35px rgba(0,0,0,.35);width:100%;max-width:420px;text-align:center}
    h1{margin:0 0 18px}
    label{display:block;margin-top:14px;font-size:14px;color:var(--muted);text-align:right}
    input{width:100%;padding:10px;margin-top:6px;border:1px solid var(--border);border-radius:10px;
         background:#0b1324;color:var(--text);outline:none}
    button{width:100%;padding:12px;margin-top:18px;background:var(--primary);color:#062b1a;font-weight:700;
         border:none;border-radius:10px;cursor:pointer}
    button:hover{background:var(--primary-hover)}
    .rule{font-size:13px;margin:3px 0;text-align:right}
    .rule.red{color:#ef4444}
    .rule.green{color:#22c55e}
    #msg{margin-top:12px;font-size:14px;text-align:center;display:none}
  </style>
</head>
<body>

<div class="box">
  <img src="/logo.png" style="width:64px;margin-bottom:12px" alt="Floosy"/>
  <h1>كلمة سر جديدة</h1>

  <label>كلمة السر الجديدة</label>
  <input id="pass1" type="password" placeholder="********"/>

  <label>تأكيد كلمة السر</label>
  <input id="pass2" type="password" placeholder="********"/>

  <div id="rules">
    <p id="rule-lower" class="rule red">● حرف صغير (a-z)</p>
    <p id="rule-upper" class="rule red">● حرف كبير (A-Z)</p>
    <p id="rule-num"   class="rule red">● رقم (0-9)</p>
    <p id="rule-len"   class="rule red">● 8 أحرف+</p>
  </div>

  <button id="saveBtn">حفظ</button>
  <div id="msg"></div>
</div>

<script>
const pass1 = document.getElementById('pass1');
const pass2 = document.getElementById('pass2');
const msg   = document.getElementById('msg');

pass1.addEventListener('input', checkRules);
function checkRules(){
  const p=pass1.value;
  document.getElementById('rule-lower').className = /[a-z]/.test(p)?'rule green':'rule red';
  document.getElementById('rule-upper').className = /[A-Z]/.test(p)?'rule green':'rule red';
  document.getElementById('rule-num').className   = /\d/.test(p)?'rule green':'rule red';
  document.getElementById('rule-len').className   = p.length>=8?'rule green':'rule red';
}

async function saveNew(){
  msg.style.display='none';
  const p1=pass1.value.trim(), p2=pass2.value.trim();
  if(p1.length<8){
    msg.textContent='كلمة مرور غير قوية'; msg.style.display='block'; msg.style.color='#ef4444'; return;
  }
  if(p1!==p2){
    msg.textContent='كلمتا المرور غير متطابقتين'; msg.style.display='block'; msg.style.color='#ef4444'; return;
  }
  // Send to backend:
  try{
    const urlParams = new URLSearchParams(location.search);
    const email = urlParams.get('email') || '';
    const r = await fetch('/forgot-password/reset',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ email, new_password:p1 })
    });
    const d=await r.json();
    if(r.ok){
      msg.textContent='✅ تم تغيير كلمة السر، سيتم تحويلك...';
      msg.style.color='#22c55e';
      msg.style.display='block';
      setTimeout(()=>location.href='/login.html',1500);
    }else{
      msg.textContent=d.error||'خطأ عند التغيير';
      msg.style.color='#ef4444';
      msg.style.display='block';
    }
  }catch{
    msg.textContent='تعذّر الاتصال';
    msg.style.color='#ef4444';
    msg.style.display='block';
  }
}

document.getElementById('saveBtn').addEventListener('click',saveNew);
</script>
</body>
</html>
