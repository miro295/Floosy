<!-- public/features.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>مزايا Floosy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{ --bg:#0f172a; --card:#111827; --text:#e5e7eb; --muted:#94a3b8; --border:rgba(148,163,184,.15) }
    body{ margin:0; min-height:100vh; background:linear-gradient(180deg,#0b1220,#0f172a); color:var(--text); font-family:system-ui,sans-serif; display:grid; place-items:center; padding:24px }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; width:100%; max-width:720px }
    h1{ margin:0 0 10px }
    ul{ margin:8px 0 0 0; padding:0 18px }
    li{ margin:6px 0; color:var(--text) }
    .muted{ color:var(--muted) }
    a{ color:#7dd3fc; text-decoration:none }
  </style>
</head>
<body>
  <div class="card">
    <h1>مزايا Floosy</h1>
    <ul>
      <li>تحويلات محلية فورية بين أرقام Floosy.</li>
      <li>طلبات تعبئة/سحب بإشراف الإدارة وموافقة سريعة.</li>
      <li>سجل عمليات واضح وواجهة RTL نظيفة.</li>
      <li>تأكيد بريد إلكتروني وأمان أساسي JWT.</li>
    </ul>
    <p class="muted" style="margin-top:10px">للبدء: <a href="/register.html">إنشاء حساب</a> — أو <a href="/login.html">تسجيل دخول</a></p>
  </div>
</body>
</html>
