<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>نسيت كلمة السر - Floosy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#0f172a; --card:#111827; --text:#e5e7eb; --primary:#22c55e;
      --muted:#94a3b8; --border:rgba(148,163,184,.15); --primary-hover:#16a34a;
    }
    body{margin:0;min-height:100vh;background:linear-gradient(180deg,#0b1220,#0f172a);
         color:var(--text);font-family:system-ui,sans-serif;display:grid;place-items:center;padding:20px}
    .box{background:var(--card);border:1px solid var(--border);padding:24px;border-radius:16px;
         box-shadow:0 12px 35px rgba(0,0,0,.35);width:100%;max-width:420px;text-align:center}
    h1{margin:0 0 18px}
    label{display:block;margin-top:12px;font-size:14px;color:var(--muted);text-align:right}
    input[type="email"]{
      width:100%;padding:10px;margin-top:6px;border:1px solid var(--border);border-radius:10px;
      background:#0b1324;color:var(--text);outline:none
    }
    .pin-row{display:flex;justify-content:center;gap:8px;margin:12px 0 6px}
    .pin{width:42px;height:50px;font-size:26px;text-align:center;border:1px solid var(--border);
         border-radius:10px;background:#0b1324;color:var(--text)}
    button{
      width:100%;padding:12px;margin-top:14px;background:var(--primary);color:#062b1a;font-weight:700;
      border:none;border-radius:10px;cursor:pointer
    }
    button[disabled]{opacity:.65;cursor:not-allowed}
    button:hover{background:var(--primary-hover)}
    .muted{color:var(--muted);font-size:13px;margin-top:6px}
    .msg{margin-top:12px;display:none;border-radius:8px;padding:10px;text-align:center;font-size:14px}
    .msg.ok{background:#065f46;color:#d1fae5}
    .msg.err{background:#7f1d1d;color:#fee2e2}
    .link{margin-top:10px;font-size:14px}
    .link a{color:var(--primary);text-decoration:none}
    .sep{height:1px;background:var(--border);margin:16px 0}
  </style>
</head>
<body>

<div class="box">
  <img src="/logo.png" alt="Floosy" style="width:64px;margin-bottom:12px"/>
  <h1>نسيت كلمة السر</h1>

  <!-- خطوة 1: إدخال البريد -->
  <div id="step-email">
    <label for="email">أدخل بريدك الإلكتروني</label>
    <input id="email" type="email" placeholder="name@example.com" autocomplete="email" />
    <button id="sendBtn">إرسال كود التحقق</button>
    <div id="msg1" class="msg"></div>
    <div class="muted">سنرسل لك كود مكون من 6 أرقام لإعادة التعيين.</div>
  </div>

  <!-- فاصل بسيط -->
  <div class="sep"></div>

  <!-- خطوة 2: إدخال الكود -->
  <div id="step-otp" style="display:none">
    <p class="muted" id="otpHint">تم إرسال الكود إلى: <span id="maskedEmail"></span></p>
<input id="otpInput" type="text" inputmode="numeric" pattern="\d*" maxlength="6"
       style="direction:ltr;letter-spacing:8px;width:100%;height:48px;font-size:30px;
              border:1px solid rgba(148,163,184,.25);border-radius:10px;
              background:#0b1324;color:#e5e7eb;text-align:center" />
    <button id="verifyBtn">تأكيد الكود</button>
    <button id="resendBtn" style="margin-top:8px;background:#0b1324;color:var(--text);border:1px solid var(--border)">إعادة إرسال (<span id="resendLeft">60</span>s)</button>
    <div id="msg2" class="msg"></div>
    <div class="link"><a href="#" id="changeEmailLink">تغيير البريد</a></div>
  </div>
</div>

<script>
  // ===== Helpers =====
  const $ = s => document.querySelector(s);
  const show = (el, yes=true)=> el.style.display = yes ? '' : 'none';
  function banner(el, text, ok=false){
    el.textContent = text;
    el.className = 'msg ' + (ok ? 'ok' : 'err');
    el.style.display = 'block';
  }
  function validEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(String(e||'').trim()); }
  function bindAutoAdvance(container){
    const inputs = container.querySelectorAll('input.pin');
    inputs.forEach((inp,i)=>{
      inp.addEventListener('input',()=>{
        inp.value = inp.value.replace(/\D/g,'').slice(0,1);
        if (inp.value && i < inputs.length-1) inputs[i+1].focus();
      });
      inp.addEventListener('keydown',(e)=>{
        if (e.key === 'Backspace' && !inp.value && i>0) inputs[i-1].focus();
        if (e.key === 'ArrowLeft'  && i>0) inputs[i-1].focus();
        if (e.key === 'ArrowRight' && i<inputs.length-1) inputs[i+1].focus();
      });
      inp.addEventListener('paste',(e)=>{
        const txt = (e.clipboardData || window.clipboardData).getData('text') || '';
        if (!/^\d{4,6}$/.test(txt)) return;
        e.preventDefault();
        const arr = txt.trim().slice(0,6).split('');
        arr.forEach((d,idx)=>{ if(inputs[idx]) inputs[idx].value = d; });
        inputs[Math.min(arr.length, inputs.length)-1].focus();
      });
    });
  }
function getOtp(){
  return (document.getElementById('otpInput').value || '').trim();
}
  function countdown(sec, onTick, onDone){
    let left = sec;
    onTick(left);
    const id = setInterval(()=>{
      left -= 1;
      onTick(left);
      if (left <= 0){ clearInterval(id); onDone && onDone(); }
    }, 1000);
    return ()=>clearInterval(id);
  }


  // ===== Step 1: send OTP =====
  let currentEmail = '';
  let stopTimer = null;
  let resendLock = false;

  async function sendOtp(email){
    try{
      const r = await fetch('/forgot-password/send-otp',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email })
      });
      return await r.json();
    }catch{ return { error:'تعذّر الاتصال' }; }
  }

  $('#sendBtn').addEventListener('click', async ()=>{
    const email = ($('#email').value || '').trim().toLowerCase();
    $('#msg1').style.display = 'none';
    if (!validEmail(email)) return banner($('#msg1'),'بريد غير صالح');

    $('#sendBtn').disabled = true;
    const res = await sendOtp(email);
    $('#sendBtn').disabled = false;

    if (res && res.ok){
      currentEmail = email;
      localStorage.setItem('floosy_email', email);
      $('#otpHint').textContent = 'أدخل الكود المرسل إلى: ' + email;
      show($('#step-email'), false);
      show($('#step-otp'), true);
      document.getElementById('step-otp').scrollIntoView({ behavior: 'smooth' });
      // ضع الإيميل بشكل مخفي في span#maskedEmail
document.getElementById('maskedEmail').textContent = maskEmail(currentEmail);
      // ابدأ عدّاد 60 ثانية لإعادة الإرسال
      
      $('#resendBtn').disabled = true;
      resendLock = true;
      stopTimer && stopTimer();
      stopTimer = countdown(60, n=> $('#resendLeft').textContent = n, ()=>{
        $('#resendBtn').disabled = false;
        resendLock = false;
        $('#resendLeft').textContent = '0';
      });
      banner($('#msg2'),'تم إرسال الكود ✉️', true);
      // فوكس على أول خانة
      const first = $('#otpRow .pin'); first && first.focus();
    } else {
      banner($('#msg1'), (res && res.error) || 'تعذّر الإرسال');
    }
  });

  // ===== Step 2: verify OTP =====
  async function verifyOtp(email, otp){
    try{
      const r = await fetch('/forgot-password/verify-otp',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email, otp })
      });
      return await r.json();
    }catch{ return { error:'تعذّر الاتصال' }; }
  }

  $('#verifyBtn').addEventListener('click', async ()=>{
    const otp = getOtp();
    $('#msg2').style.display = 'none';
    if (!/^\d{6}$/.test(otp)) return banner($('#msg2'),'أدخل 6 أرقام صحيحة');

    $('#verifyBtn').disabled = true;
    const res = await verifyOtp(currentEmail, otp);
    $('#verifyBtn').disabled = false;

    if (res && res.ok){
      banner($('#msg2'), '✅ تم التحقق — جارٍ تحويلك...', true);
      setTimeout(()=> location.href = '/reset-password.html?email=' + encodeURIComponent(currentEmail), 900);
    } else {
      banner($('#msg2'), (res && res.error) || 'الكود غير صحيح');
    }
  });

  // إعادة إرسال
  $('#resendBtn').addEventListener('click', async ()=>{
    if (resendLock || !currentEmail) return;
    $('#msg2').style.display = 'none';
    $('#resendBtn').disabled = true;
    resendLock = true;
    const res = await sendOtp(currentEmail);
    if (res && res.ok){
      banner($('#msg2'), '📨 تم إعادة إرسال الكود', true);
      // ابدأ عدّاد جديد
      stopTimer && stopTimer();
      stopTimer = countdown(60, n=> $('#resendLeft').textContent = n, ()=>{
        $('#resendBtn').disabled = false;
        resendLock = false;
        $('#resendLeft').textContent = '0';
      });
    } else {
      $('#resendBtn').disabled = false;
      resendLock = false;
      banner($('#msg2'), (res && res.error) || 'تعذّر الإرسال');
    }
  });

  // تغيير البريد
  $('#changeEmailLink').addEventListener('click', (e)=>{
    e.preventDefault();
    show($('#step-otp'), false);
    show($('#step-email'), true);
    $('#msg1').style.display = 'none';
    $('#email').focus();
  });

  // Enter shortcuts
  document.addEventListener('keydown',(e)=>{
    if (e.key === 'Enter'){
      if ($('#step-email').style.display !== 'none') $('#sendBtn').click();
      else $('#verifyBtn').click();
    }
  });
  // بدل النص الافتراضي ليُظهر الإيميل بشكل مخفي ahm…@gmail.com
function maskEmail(e){
  e = String(e||'');
  const at = e.indexOf('@');
  if(at<=2) return e; // لو قصير
  return e.slice(0,3) + '…' + e.slice(at);
}

</script>

</body>
</html>
