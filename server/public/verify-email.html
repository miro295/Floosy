<!-- public/verify-email.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>تأكيد البريد الإلكتروني - FLOOSY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#0f172a; --card:#111827; --muted:#94a3b8; --text:#e5e7eb;
      --primary:#22c55e; --primary-hover:#16a34a;
      --border:rgba(148,163,184,.15); --shadow:0 12px 35px rgba(0,0,0,.35);
      --danger:#ef4444;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      background:linear-gradient(180deg,#0b1220 0%, #0f172a 100%);
      font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color:var(--text);
    }
    .card{
      width:min(520px,94vw);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:24px;
    }
    h1{margin:0 0 6px; font-size:22px}
    p{margin:6px 0 18px; color:var(--muted); line-height:1.6}
    .otp{
      display:flex; gap:10px; justify-content:space-between; margin:16px 0 10px;
    }
    .otp input{
      width:48px; height:56px; text-align:center; font-size:22px; color:var(--text);
      background:#0b1324; border:1px solid var(--border); border-radius:12px;
      outline:none; transition:border .2s ease;
    }
    .otp input:focus{border-color:var(--primary)}
    .row{display:flex; gap:12px; align-items:center; margin-top:12px; flex-wrap:wrap}
    .btn{
      padding:12px 16px; border-radius:12px; border:1px solid var(--border);
      background:#0b1324; color:var(--text); cursor:pointer; font-weight:600;
    }
    .btn.primary{background:var(--primary); border-color:transparent}
    .btn.primary:hover{background:var(--primary-hover)}
    .btn:disabled{opacity:.55; cursor:not-allowed}
    .muted{color:var(--muted)}
    .actions{display:flex; justify-content:space-between; align-items:center; margin-top:8px}
    .link{background:none; border:none; color:#93c5fd; cursor:pointer; padding:0; font-weight:600}
    .error{color:var(--danger); margin-top:8px; min-height:20px}
    .hint{font-size:13px; color:var(--muted); margin-top:6px}
    .badge{display:inline-block; padding:6px 10px; border:1px solid var(--border); border-radius:10px; font-size:12px; color:var(--muted)}
  </style>
</head>
<body>
  <main class="card" aria-labelledby="title">
    <h1 id="title">أدخل كود التأكيد</h1>
    <p>أرسلنا كود مكوّن من 6 أرقام إلى بريدك الإلكتروني. رجاءً اكتب الكود بالأسفل للتحقق من بريدك.</p>

    <div class="badge" id="emailBadge">البريد: —</div>

    <div class="otp" dir="ltr" aria-label="أرقام رمز التحقق">
      <input inputmode="numeric" maxlength="1" aria-label="الرقم 1" />
      <input inputmode="numeric" maxlength="1" aria-label="الرقم 2" />
      <input inputmode="numeric" maxlength="1" aria-label="الرقم 3" />
      <input inputmode="numeric" maxlength="1" aria-label="الرقم 4" />
      <input inputmode="numeric" maxlength="1" aria-label="الرقم 5" />
      <input inputmode="numeric" maxlength="1" aria-label="الرقم 6" />
    </div>

    <div class="row">
      <button id="verifyBtn" class="btn primary">تأكيد</button>
      <span class="hint" id="timerHint">تقدر تعيد إرسال الكود بعد <span id="sec">60</span> ثانية</span>
    </div>

    <div class="actions">
      <button id="resendBtn" class="btn" disabled>إعادة إرسال الكود</button>
      <button id="changeEmailBtn" class="link">تغيير البريد</button>
    </div>

    <div class="hint">عدد مرات إعادة الإرسال المتبقية: <span id="remain">10</span></div>
    <div id="error" class="error" role="alert" aria-live="polite"></div>
  </main>

  <script>
    // ===== Config =====
    const VERIFY_ENDPOINT = "/api/auth/verify-email";   // POST { email, code }
    const RESEND_ENDPOINT = "/api/auth/resend-otp";     // POST { email }
    const REDIRECT_AFTER_VERIFY = "/dashboard.html";    // أو غيّرها لصفحة PIN لو تبي

    // ===== State from previous step =====
    // نتوقع إنك خزّنت الإيميل مؤقتًا بعد التسجيل:
    const email = (localStorage.getItem("signup_email") || "").trim();
    const emailBadge = document.getElementById("emailBadge");
    emailBadge.textContent = email ? `البريد: ${email}` : "البريد: —";

    const inputs = Array.from(document.querySelectorAll(".otp input"));
    const verifyBtn = document.getElementById("verifyBtn");
    const resendBtn = document.getElementById("resendBtn");
    const changeEmailBtn = document.getElementById("changeEmailBtn");
    const err = document.getElementById("error");
    const sec = document.getElementById("sec");
    const remain = document.getElementById("remain");
    const timerHint = document.getElementById("timerHint");

    // ===== Resend quota (max 10) =====
    const RESEND_KEY = "verify_email_resends";
    const STARTED_AT_KEY = "verify_email_timer_started_at";
    const MAX_RESENDS = 10;
    const COOLDOWN = 60; // seconds

    function getResends(){
      const n = parseInt(localStorage.getItem(RESEND_KEY) || "0", 10);
      return isNaN(n) ? 0 : n;
    }
    function setResends(n){
      localStorage.setItem(RESEND_KEY, String(n));
      remain.textContent = String(MAX_RESENDS - n);
    }

    // ===== Cooldown Timer =====
    function startTimer(){
      localStorage.setItem(STARTED_AT_KEY, String(Date.now()));
      updateTimer();
      resendBtn.disabled = true;
      const t = setInterval(() => {
        const left = updateTimer();
        if (left <= 0) {
          clearInterval(t);
          resendBtn.disabled = (getResends() >= MAX_RESENDS);
          timerHint.textContent = "تقدر تعيد إرسال الكود الآن";
        }
      }, 250);
    }

    function updateTimer(){
      const started = parseInt(localStorage.getItem(STARTED_AT_KEY) || "0", 10);
      const elapsed = Math.floor((Date.now() - started)/1000);
      const left = Math.max(0, COOLDOWN - elapsed);
      sec.textContent = String(left);
      return left;
    }

    // أول تحميل: لو مفيش مؤقّت سابق، نبدأه
    if (!localStorage.getItem(STARTED_AT_KEY)) {
      startTimer();
    } else {
      const left = updateTimer();
      if (left > 0) {
        resendBtn.disabled = true;
        timerHint.innerHTML = `تقدر تعيد إرسال الكود بعد <span id="sec">${left}</span> ثانية`;
      } else {
        resendBtn.disabled = (getResends() >= MAX_RESENDS);
        timerHint.textContent = "تقدر تعيد إرسال الكود الآن";
      }
    }
    setResends(getResends()); // تحدّث العداد الظاهر

    // ===== OTP inputs UX =====
    inputs.forEach((inp, idx) => {
      inp.addEventListener("input", e => {
        const v = e.target.value.replace(/\D/g, "");
        e.target.value = v.slice(-1);
        if (e.inputType === "insertText" && v && idx < inputs.length - 1) {
          inputs[idx + 1].focus();
        }
      });
      inp.addEventListener("keydown", e => {
        if (e.key === "Backspace" && !e.target.value && idx > 0) {
          inputs[idx - 1].focus();
        }
      });
      inp.addEventListener("paste", e => {
        const txt = (e.clipboardData.getData("text") || "").replace(/\D/g,"").slice(0,6);
        if (!txt) return;
        e.preventDefault();
        for (let i=0; i<6; i++){
          inputs[i].value = txt[i] || "";
        }
        inputs[Math.min(txt.length,5)].focus();
      });
    });
    inputs[0].focus();

    function getCode(){
      return inputs.map(i => i.value || "").join("");
    }

    function setLoading(on){
      verifyBtn.disabled = on;
      resendBtn.disabled = on || updateTimer()>0 || getResends()>=MAX_RESENDS;
      changeEmailBtn.disabled = on;
    }

    async function verify(){
      err.textContent = "";
      const code = getCode();
      if (code.length !== 6 || !/^\d{6}$/.test(code)){
        err.textContent = "رجاءً أدخل الكود الصحيح (6 أرقام).";
        return;
      }
      if (!email){
        err.textContent = "البريد غير معروف. ارجع لخطوة التسجيل.";
        return;
      }
      try{
        setLoading(true);
        const res = await fetch(VERIFY_ENDPOINT, {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ email, code })
        });
        if (!res.ok){
          const j = await res.json().catch(()=>({message:"حدث خطأ أثناء التحقق"}));
          throw new Error(j.message || "فشل التحقق من الكود");
        }
        // نجاح
        // تقدر بدل التحويل للداشبورد، تحوله لصفحة PIN لو حاب:
        // window.location.href = "/pin.html";
        window.location.href = REDIRECT_AFTER_VERIFY;
      }catch(e){
        err.textContent = e.message || "فشل التحقق. حاول مرة أخرى.";
      }finally{
        setLoading(false);
      }
    }

    async function resend(){
      err.textContent = "";
      if (getResends() >= MAX_RESENDS){
        err.textContent = "وصلت الحد الأقصى لإعادة الإرسال.";
        return;
      }
      if (!email){
        err.textContent = "البريد غير معروف. ارجع لخطوة التسجيل.";
        return;
      }
      try{
        setLoading(true);
        const res = await fetch(RESEND_ENDPOINT, {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ email })
        });
        if (!res.ok){
          const j = await res.json().catch(()=>({message:"تعذّر إرسال الكود"}));
          throw new Error(j.message || "تعذّر إرسال الكود");
        }
        setResends(getResends() + 1);
        startTimer();
      }catch(e){
        err.textContent = e.message || "تعذّر إرسال الكود. جرّب لاحقًا.";
      }finally{
        setLoading(false);
      }
    }

    verifyBtn.addEventListener("click", verify);
    resendBtn.addEventListener("click", resend);
    changeEmailBtn.addEventListener("click", () => {
      // افتح صفحة تعديل البريد (أو مودال) — حسب عندك
      // مثال:
      window.location.href = "/change-email.html";
    });

    // Enter submits
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") verify();
    });
  </script>
</body>
</html>
