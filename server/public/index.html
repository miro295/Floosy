<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floosy - الصفحة الرئيسية</title>
  <style>
    :root {
      --primary: #0b1324;
      --accent: #00d084;
    }
    body {
      margin: 0;
      font-family: sans-serif;
      background: var(--primary);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: rgba(255, 255, 255, 0.02);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #00bcd4);
      box-shadow: 0 6px 18px rgba(34,197,94,.35);
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 16px;
      letter-spacing: 1px;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 1.5rem;
    }
    p {
      color: #bbb;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--primary);
      margin-right: 8px;
    }
    .btn-primary:hover {
      background: #00b072;
    }
    .btn-secondary {
      background: #1e293b;
      color: #fff;
    }
    .btn-secondary:hover {
      background: #334155;
    }
    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Floosy</div>
    <h1>مرحبًا بك في Floosy</h1>
    <p>إدارة أموالك أسهل من أي وقت مضى - افتح حسابك الآن أو سجّل الدخول للوصول إلى خدماتنا.</p>
    <a href="register.html" class="btn btn-primary">إنشاء حساب</a>
    <a href="login.html" class="btn btn-secondary">تسجيل دخول</a>
    <footer>Floosy 2025 ©</footer>
  </div>
</body>
</html>
